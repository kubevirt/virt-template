# Allow egress from the controller-manager to all namespaces on port 443.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller-egress
  namespace: system
  labels:
    app.kubernetes.io/name: virt-template
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: virt-template
  policyTypes:
    - Egress
  egress:
    - to:
      - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
