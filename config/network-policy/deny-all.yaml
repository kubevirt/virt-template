apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: system
  labels:
    app.kubernetes.io/name: virt-template
    app.kubernetes.io/managed-by: kustomize
    kubevirt.io: virt-template-deny-all
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: virt-template
  policyTypes:
    - Ingress
    - Egress
